data:
  feed:
    primary: "polygon"
    fallback: "yahoo"
    rate_limit_pause: 12.5

  intervals:
    primary: "1h"
    daily: "1d"

  storage_path: "./data/cache"
  cache_max_age_hours: 4
  lookback_years: 2

  polygon:
    adjusted: true
    max_retries: 3
    timeout_seconds: 30

backtesting:
  initial_capital: 100000
  rebalance_frequency: "M"
  sizing_method: "equal_weight"
  cost_model:
    commission: 0.001
    slippage_bps: 5
    spread_bps: 2

execution:
  mode: paper
  broker: paper

risk:
  max_position_size: 0.20
  max_portfolio_concentration: 0.40
  default_sizing: equal_weight
  vol_parity:
    target_vol: 0.10
    lookback_days: 60
    max_position: 0.20

strategy:
  formation_months: 12
  skip_months: 1
  rebalance_freq: "M"
  long_quantile: 0.20
  short_quantile: 0.20
  use_regime_filter: true
  regime_benchmark: "SPY"
  regime_ma_window: 200

optimizer:
  enabled: false
  train_fraction: 0.70
  overfit_ratio_warning: 1.5
  param_grid:
    formation_months: [3, 6, 9, 12]
    skip_months: [0, 1]
    rebalance_freq: ["M", "W"]

ml:
  features:
    feature_version: "v1"
    timeframe: "1h"
    groups:
      - trend
      - momentum
      - volatility
      - volume
      - candle
    normalization: "robust"
    lookback_periods:
      sma_short: 20
      sma_medium: 50
      sma_long: 200
      rsi: 14
      atr: 14
      bb: 20
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      realized_vol_short: 10
      realized_vol_long: 20
      warmup_bars: 200

  labeling:
    method: "triple_barrier"
    take_profit: 0.015
    stop_loss: 0.008
    max_holding: 48
    min_return: 0.003
    handle_imbalance: "weights"

  training:
    train_window_days: 504
    test_window_days: 63
    step_size_days: 21
    purge_days: 5
    embargo_days: 10
    transaction_cost_bps: 7.0
    model_output_dir: "./models/"
    results_output_dir: "./outputs/ml/"

  model:
    type: "lgbm"
    params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 4
      num_leaves: 15
      min_child_samples: 50
      feature_fraction: 0.7
      bagging_fraction: 0.8
      bagging_freq: 5
      reg_alpha: 0.1
      reg_lambda: 0.1

  strategy:
    min_confidence: 0.45
    min_holding_days: 3
    use_regime_filter: true
    signal_smoothing: true
    confidence_thresholds_to_test: [0.35, 0.40, 0.45, 0.50, 0.55, 0.60]

  registry:
    path: "./models/registry.json"
